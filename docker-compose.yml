version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: starfit_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  nextapp:
    build:
      context: .
      dockerfile: Dockerfile  # اشاره به همین داکرفایلی که فرستادید
    container_name: starfit_web
    ports:
      - "3000:3000"
    env_file:
      - .env                  # متغیرهای .env را به داکر معرفی می‌کند
    depends_on:
      - mongodb

volumes:
  mongo_data: